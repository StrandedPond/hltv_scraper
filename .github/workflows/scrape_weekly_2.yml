name: Weekly Scrapers — Chunk 2 of 3

# Chunk 2 runs 2 hours after chunk 1 (Tuesday 00:00 UTC = Tuesday 08:00 Manila).
# Checks out the repo AFTER chunk 1 has committed, so the CSV skip logic will
# automatically skip all entries already written by chunk 1.
#
# Processes:
#   Teams  17–33 of the Top 50 (17 teams)
#   Players 40–79 from player_urls.json

on:
  schedule:
    - cron: '0 0 * * 2'    # Tuesday 00:00 UTC = Tuesday 08:00 Asia/Manila
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-chunk-2:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f hltv_scraper/requirements.txt ]; then pip install -r hltv_scraper/requirements.txt; fi
          pip install scrapling playwright pandas curl_cffi browserforge patchright msgspec
          playwright install chromium
          patchright install chromium

      # ── Team stats — teams 17–33 ─────────────────────────────────────────────
      - name: Run Team Map Stats Scraper (chunk 2/3)
        run: python hltv_scraper/team_stats/hltv_team_map_stats.py --offset 17 --limit 17

      - name: Run Top 50 Teams Scraper (chunk 2/3)
        run: python hltv_scraper/team_stats/hltv_top50_team.py --offset 17 --limit 17

      # ── Detailed player profiles — players 40–79 ─────────────────────────────
      - name: Run Detailed Players Scraper (chunk 2/3)
        run: python hltv_scraper/player_stats/detailed_players_scraper.py --offset 40 --limit 40

      # ── Persist results ──────────────────────────────────────────────────────
      - name: Commit and Push changes
        run: |
          git config user.name "StrandedPond"
          git config user.email "30177985+StrandedPond@users.noreply.github.com"
          git pull --rebase   # incorporate chunk 1 commit before pushing
          git add *.csv *.json
          git commit -m "Weekly scrape — chunk 2/3 [skip ci]" || echo "No changes to commit"
          git push

name: Weekly Scrapers — Chunk 3 of 3

# Chunk 3 runs 4 hours after chunk 1 (Tuesday 02:00 UTC = Tuesday 10:00 Manila).
# Checks out the repo AFTER chunks 1 & 2 have committed, so the CSV skip logic
# will automatically skip all entries already written by those chunks.
#
# Processes:
#   Teams  34+ of the Top 50 (remaining ~16 teams, no --limit needed)
#   Players 80+ from player_urls.json (remaining ~36 players, no --limit needed)

on:
  schedule:
    - cron: '0 2 * * 2'    # Tuesday 02:00 UTC = Tuesday 10:00 Asia/Manila
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-chunk-3:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f hltv_scraper/requirements.txt ]; then pip install -r hltv_scraper/requirements.txt; fi
          pip install scrapling playwright pandas curl_cffi browserforge patchright msgspec
          playwright install chromium
          patchright install chromium

      # ── Team stats — remaining teams (offset 34, no limit) ──────────────────
      - name: Run Team Map Stats Scraper (chunk 3/3)
        run: python hltv_scraper/team_stats/hltv_team_map_stats.py --offset 34

      - name: Run Top 50 Teams Scraper (chunk 3/3)
        run: python hltv_scraper/team_stats/hltv_top50_team.py --offset 34

      # ── Detailed player profiles — players 80+ ───────────────────────────────
      - name: Run Detailed Players Scraper (chunk 3/3)
        run: python hltv_scraper/player_stats/detailed_players_scraper.py --offset 80

      # ── Persist results ──────────────────────────────────────────────────────
      - name: Commit and Push changes
        run: |
          git config user.name "StrandedPond"
          git config user.email "30177985+StrandedPond@users.noreply.github.com"
          git pull --rebase   # incorporate chunks 1 & 2 commits before pushing
          git add *.csv *.json
          git commit -m "Weekly scrape — chunk 3/3 [skip ci]" || echo "No changes to commit"
          git push

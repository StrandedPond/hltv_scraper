name: Daily Scrapers

on:
  schedule:
    - cron: '0 22 * * *'   # Every day at 6:00 AM Manila time (22:00 UTC)
  workflow_dispatch:         # Allow manual trigger from the GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f hltv_scraper/requirements.txt ]; then pip install -r hltv_scraper/requirements.txt; fi
          pip install scrapling playwright pandas curl_cffi browserforge patchright msgspec
          playwright install chromium
          patchright install chromium

      - name: Run Match Results Scraper
        working-directory: hltv_scraper/match_results
        run: python scraper.py

      - name: Run Valve Ranking Scraper
        run: python hltv_scraper/rankings/valve_ranking_scraper.py

      - name: Commit and Push changes
        run: |
          git config user.name "StrandedPond"
          git config user.email "30177985+StrandedPond@users.noreply.github.com"
          git add *.csv hltv_scraper/*.csv hltv_scraper/matches.csv hltv_scraper/player_stats.csv
          git commit -m "Automated daily scraper update [skip ci]" || echo "No changes to commit"
          git push


name: Weekly Scrapers

on:
  schedule:
    - cron: '0 22 * * 1' # Every Monday at 6:00 AM Manila time (22:00 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f hltv_scraper/requirements.txt ]; then pip install -r hltv_scraper/requirements.txt; fi
          pip install scrapling playwright pandas curl_cffi
          playwright install chromium

      - name: Run Team Map Stats Scraper
        run: python hltv_scraper/team_stats/hltv_team_map_stats.py

      - name: Run Top 50 Teams Scraper
        run: python hltv_scraper/team_stats/hltv_top50_team.py

      - name: Run Player Stats Scraper
        run: python hltv_scraper/player_stats/hltv_scraper.py

      - name: Run Player Data Aggregation
        run: python hltv_scraper/player_stats/hltv_stats.py

      - name: Run Detailed Players Scraper
        run: python hltv_scraper/player_stats/detailed_players_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.csv *.json
          git commit -m "Automated weekly scraper update [skip ci]" || echo "No changes to commit"
          git push
